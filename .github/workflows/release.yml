name: Release

on:
  push:
    tags:
      - "v*"
      - "dev"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      is_dev: ${{ steps.parse.outputs.is_dev }}
    steps:
      - uses: actions/checkout@v6
      - name: Parse tag
        id: parse
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$RAW_TAG" == "dev" ]]; then
            # dev tag: use base version from Cargo.toml with -dev suffix
            BASE=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            # Strip any existing pre-release suffix (e.g. "0.0.11-dev" -> "0.0.11")
            BASE="${BASE%%-*}"
            TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
            echo "version=${BASE}-dev.${TIMESTAMP}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
          else
            TAG="${RAW_TAG#v}"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
            if [[ "$TAG" == *-* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (musl — static linking, no glibc dependency)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: cs-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: cs-linux-arm64
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            name: cs-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: cs-darwin-arm64
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: cs-windows-amd64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: cs-windows-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross (Linux ARM64 musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Inject version into Cargo.toml
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          # Strip pre-release suffix for Cargo semver (e.g., 0.0.1-dev -> 0.0.1-dev is valid semver)
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          echo "Building version: ${VERSION}"
          grep '^version' Cargo.toml

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/codex-switch"
          chmod +x "$BIN"
          tar czf "${{ matrix.name }}.tar.gz" -C "target/${{ matrix.target }}/release" codex-switch
          shasum -a 256 "${{ matrix.name }}.tar.gz" > "${{ matrix.name }}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          7z a "${{ matrix.name }}.zip" "./target/${{ matrix.target }}/release/codex-switch.exe"
          sha256sum "${{ matrix.name }}.zip" > "${{ matrix.name }}.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.zip.sha256
          if-no-files-found: ignore

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate install script body
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          cat > artifacts/INSTALL.md << 'HEREDOC'
          ## Quick Install

          ### macOS / Linux (one-liner)

          ```bash
          curl -fsSL https://github.com/xjoker/codex-switch/releases/latest/download/install.sh | bash
          ```

          ### Windows (PowerShell)

          ```powershell
          irm https://github.com/xjoker/codex-switch/releases/latest/download/install.ps1 | iex
          ```

          ### Manual Download

          Download the appropriate binary from the assets below and place it in your PATH.
          HEREDOC

      - name: Copy install scripts
        run: |
          cp scripts/install.sh artifacts/install.sh
          cp scripts/install.ps1 artifacts/install.ps1

      - name: Delete existing dev release
        if: needs.meta.outputs.is_dev == 'true'
        run: gh release delete dev --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-create dev tag at current commit
        if: needs.meta.outputs.is_dev == 'true'
        run: |
          git tag -f dev "$GITHUB_SHA"
          git push -f origin dev

      - name: Generate dev release body
        if: needs.meta.outputs.is_dev == 'true'
        id: dev_body
        run: |
          cat > dev_body.md << EOF
          Development build from \`master\` at ${{ github.sha }}.

          **This is a pre-release build for testing.** Use \`codex-switch self-update --dev\` to install, or \`codex-switch self-update\` to return to the latest stable release.

          Version: \`${{ needs.meta.outputs.version }}\`
          EOF

      - name: Create GitHub Release (dev)
        if: needs.meta.outputs.is_dev == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "dev (${{ needs.meta.outputs.version }})"
          prerelease: true
          body_path: dev_body.md
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (stable)
        if: needs.meta.outputs.is_dev != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.meta.outputs.version }}
          name: v${{ needs.meta.outputs.version }}
          prerelease: ${{ needs.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: [meta, release]
    if: needs.meta.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download sha256 files
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          BASE="https://github.com/xjoker/codex-switch/releases/download/v${VERSION}"
          for name in cs-darwin-arm64 cs-darwin-amd64 cs-linux-arm64 cs-linux-amd64; do
            curl -fsSL "${BASE}/${name}.tar.gz.sha256" -o "${name}.sha256"
          done

      - name: Extract sha256 values
        id: sha
        run: |
          echo "darwin_arm64=$(awk '{print $1}' cs-darwin-arm64.sha256)" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(awk '{print $1}' cs-darwin-amd64.sha256)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(awk '{print $1}' cs-linux-arm64.sha256)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(awk '{print $1}' cs-linux-amd64.sha256)" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          BASE="https://github.com/xjoker/codex-switch/releases/download/v${VERSION}"

          # Generate latest formula (codex-switch.rb)
          cat > codex-switch.rb << RUBY
          class CodexSwitch < Formula
            desc "Codex account switcher — multi-profile manager with usage dashboard"
            homepage "https://github.com/xjoker/codex-switch"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/cs-darwin-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              end
              on_intel do
                url "${BASE}/cs-darwin-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_amd64 }}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/cs-linux-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              end
              on_intel do
                url "${BASE}/cs-linux-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_amd64 }}"
              end
            end

            def install
              bin.install "codex-switch"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/codex-switch --version")
            end
          end
          RUBY

          # Generate versioned formula (codex-switch@X.Y.Z.rb)
          # Homebrew requires unique class names: CodexSwitchATx_y_z
          CLASS_SUFFIX=$(echo "${VERSION}" | tr '.' '_')
          cat > "codex-switch@${VERSION}.rb" << RUBY
          class CodexSwitchAT${CLASS_SUFFIX} < Formula
            desc "Codex account switcher — multi-profile manager with usage dashboard"
            homepage "https://github.com/xjoker/codex-switch"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/cs-darwin-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              end
              on_intel do
                url "${BASE}/cs-darwin-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_amd64 }}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/cs-linux-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              end
              on_intel do
                url "${BASE}/cs-linux-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_amd64 }}"
              end
            end

            keg_only :versioned_formula

            def install
              bin.install "codex-switch"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/codex-switch --version")
            end
          end
          RUBY

      - name: Push formula to tap
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/xjoker/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp codex-switch.rb tap/Formula/codex-switch.rb
          cp "codex-switch@${VERSION}.rb" "tap/Formula/codex-switch@${VERSION}.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "codex-switch ${VERSION} (latest + versioned formula)"
          git push
