name: Update Homebrew Tap

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  homebrew:
    # Only update tap for stable releases (no pre-release)
    if: "!github.event.release.prerelease"
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: codex-switch
          homebrew-tap: xjoker/homebrew-tap
          download-url: https://github.com/xjoker/codex-switch/releases/download/${{ github.event.release.tag_name }}/cs-darwin-amd64.tar.gz
          commit-message: |
            {{formulaName}} {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
